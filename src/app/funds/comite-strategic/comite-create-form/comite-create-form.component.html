<!-- Form Comite -->
<form clrForm [formGroup]="comiteSaveForm" clrLabelSize="2">
  <!-- Date of the committee -->
  <clr-date-container>
    <label for="date_c" class="clr-required-mark">Date:</label>
    <input clrDate type="date" formControlName="dateComite" name="dateComite" />
  </clr-date-container>

  <!-- Order of the day -->
  <!-- <div cds-layout="horizontal">
    <span cds-layout="m-t:md" class="clr-required-mark">Ordre du jour:</span>
    <div class="NgxEditor__Wrapper editor" cds-layout="m-l:xxl m-t:md">
      <ngx-editor-menu [editor]="editor" [toolbar]="toolbar"> </ngx-editor-menu>
      <ngx-editor
        [editor]="editor"
        formControlName="commentaires"
        [placeholder]="'Saisissez l\'ordre du jour du comité...'"
      >
      </ngx-editor>
    </div>
  </div> -->

  <clr-textarea-container>
    <label for="commentaires" class="clr-required-mark">Ordre du jour:</label>
    <textarea
      clrTextarea
      cols="75"
      rows="7"
      id="commentaires"
      formControlName="commentaires"
      [placeholder]="'Saisissez l\'ordre du jour du comité...'"
    ></textarea>
    <clr-control-helper>
      Vous pouvez utiliser la synthaxe
      <a href="https://www.markdownguide.org/basic-syntax/" target="_blank"
        >Markdown</a
      >
      pour formater votre ordre du jour</clr-control-helper
    >
  </clr-textarea-container>
</form>

<!-- Buttons -->
<div cds-layout="horizontal m-t:lg">
  <div class="btn-group">
    <cds-button
      (click)="saveComiteStrategie()"
      [disabled]="comiteSaveForm.invalid"
    >
      <cds-icon shape="add-text" size="md"></cds-icon> Sauvegarder le comité
    </cds-button>
  </div>
  <div class="btn-group">
    <cds-button [disabled]="!savedComiteStrategie">
      <cds-icon shape="details" size="md"></cds-icon> Générer le PV du comité de
      stratégie
    </cds-button>
  </div>
</div>

<!-- Documents -->
@if (create() && savedComiteStrategie) { @for (conformite of
conformite_documentaires; track $index) {
<document-upload
  #documents
  [compliance]="{ document: undefined, conformite: conformite }"
  [data]="savedComiteStrategie"
  [task_row]="1"
  [phase_row]="1"
></document-upload>
} }
