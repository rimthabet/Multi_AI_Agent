<!-- Header -->
<span cds-text="title">
  <cds-icon
    shape="building"
    size="lg"
    status="info"
    cds-layout="m-b:sm"
  ></cds-icon>
  Ajouter un nouveau projet</span
>

<!-- Header -->
<div cds-layout="m-t:md m-b:lg">
  <span
    class="project-name"
    [class]="prospection ? 'active' : ''"
    (click)="prospection ? goToFiche() : null"
  >
    {{ prospection ? prospection.nom : "Nom du projet ..." }}
    <cds-icon
      shape="dashboard"
      size="lg"
      title="Cliquer pour consulter la fiche projet"
      (click)="goToFiche()"
      style="cursor: pointer"
    ></cds-icon>
  </span>
</div>


<cds-divider
  class="htitled-divider"
  title="Gerer tout le cycle de creation des projets"
></cds-divider>

<!-- Tabs -->
<div cds-layout="m-y:sm">
  <!-- Tabs -->
  <clr-tabs>
    <!-- Prospection -->
    <clr-tab>
      <button clrTabLink>
        <cds-icon shape="announcement" size="md"></cds-icon> Prospection
        <span class="badge badge-info">1</span>
      </button>
      <clr-tab-content id="content1" *clrIfActive="true">
        <prospection [(prospection)]="prospection"> </prospection>
      </clr-tab-content>
    </clr-tab>

    <!-- Présélection -->
    <clr-tab>
      <button clrTabLink [disabled]="!prospection">
        <cds-icon shape="cursor-hand-click" size="md"></cds-icon>
        Présélection
        <span class="badge badge-info">2</span>
      </button>
      <clr-tab-content *clrIfActive>
        <preselection
          [(prospection)]="prospection"
          (preselectionSavedEvent)="projectSaved($event)"
        >
        </preselection>
      </clr-tab-content>
    </clr-tab>

    <!-- Étude -->
    <clr-tab>
      <button clrTabLink [disabled]="!prospection || prospection.statut == 3">
        <cds-icon shape="recycle" size="md"></cds-icon> Étude
        <span class="badge badge-info">3</span>
      </button>
      <clr-tab-content *clrIfActive>
        <financial-study [prospection]="prospection"></financial-study>
      </clr-tab-content>
    </clr-tab>

    <!-- Comités Internes -->
    <clr-tab>
      <button clrTabLink [disabled]="!prospection || prospection.statut == 3">
        <cds-icon shape="employee-group" solid size="md"></cds-icon> Comités
        Internes
        <span class="badge badge-info">4</span>
      </button>
      <clr-tab-content *clrIfActive>
        <comite-interne [prospection]="prospection"></comite-interne
      ></clr-tab-content>
    </clr-tab>

    <!-- Comités d'Investissement -->
    <clr-tab>
      <button clrTabLink [disabled]="!prospection || prospection.statut == 3">
        <cds-icon shape="gavel" solid size="md"></cds-icon> Comités
        d'Investissement
        <span class="badge badge-info">5</span>
      </button>
      <clr-tab-content *clrIfActive>
        <comite-investment [prospection]="prospection"></comite-investment
      ></clr-tab-content>
    </clr-tab>
  </clr-tabs>
</div>
