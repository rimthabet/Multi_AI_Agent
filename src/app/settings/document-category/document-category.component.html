<!-- Header -->
<span cds-text="title">
  <cds-icon shape="file-group" status="info" size="lg" cds-layout="m-b:sm"></cds-icon>
  Gestion des catégories documentaires</span>

<!-- Data grid -->
<clr-datagrid style="clear: both; height: calc(100vh - 138px)" [clrDgLoading]="loading"
  [(clrDgSingleSelected)]="selectedItem">
  <clr-dg-action-bar>
    <!-- Actions -->
    <div class="btn-group">
      <cds-button action="outline" status="primary" (click)="openAddModal()" onKeyPress="">
        <cds-icon shape="plus" size="md"></cds-icon> Ajouter
      </cds-button>
    </div>
    <div class="btn-group">
      <cds-button action="outline" status="warning" [disabled]="!selectedItem?.id"
        (click)="toggleShowEdit(selectedItem)" onkeypress="">
        <cds-icon shape="note" size="md"></cds-icon> Modifier
      </cds-button>
    </div>
    <div class="btn-group">
      <cds-button action="outline" status="danger" (click)="deleteCategorie()" [disabled]="!selectedItem?.id"
        (onKeyPress)="deleteCategorie()" onkeypress="">
        <cds-icon shape="trash" size="md"></cds-icon> Supprimer
      </cds-button>
    </div>
    <!-- Divider -->
    <cds-divider cds-layout="m-t:lg m-b:sm" class="htitled-divider" title="Catégories documentaires"></cds-divider>
  </clr-dg-action-bar>
  <clr-dg-column [clrDgField]="'libelle'">Libellé</clr-dg-column>
  <clr-dg-row *clrDgItems="let categorie of documentCategories" [clrDgItem]="categorie">
    <clr-dg-cell>{{ categorie.libelle }}</clr-dg-cell>
  </clr-dg-row>
  <clr-dg-footer>{{ documentCategories.length }} catégories</clr-dg-footer>
</clr-datagrid>

<!-- Modal category CRUD -->
<clr-modal #modal [(clrModalOpen)]="openModal" [clrModalSize]="'md'">
  <!-- Header -->
  <div class="modal-title">
    <cds-icon status="info" shape="file-group" size="lg" solid=""></cds-icon>
    Gestion des catégories documentaires
  </div>
  <!-- Body -->
  <div class="modal-body">
    <!-- Form -->
    <form clrForm [formGroup]="categorieForm!" clrLabelSize="2" cds-layout="p-b:lg">
      <clr-input-container>
        <label>Libellé:</label>
        <input clrInput type="text" formControlName="libelle" style="width: 425px" />
      </clr-input-container>
    </form>
  </div>
  <!-- Footer -->
  <div class="modal-footer">
    <!-- Buttons -->
    <cds-button action="outline" (click)="openModal = false" onKeyPress="openModal = false">Annuler</cds-button>
    <cds-button status="primary" (click)="saveCategorie()" [disabled]="categorieForm.invalid" onkeypress="">
      Sauvegarder
    </cds-button>
  </div>
</clr-modal>

<!-- Super admin dialog for deletion -->
<app-multi-purpose-delete-dialog #mp_delete_popup [warn_message]="delete_message" [pass_phrase]="selectedItem?.libelle"
  [rest_url]="rest_url"></app-multi-purpose-delete-dialog>
