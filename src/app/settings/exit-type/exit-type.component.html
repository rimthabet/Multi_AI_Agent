<!-- Header -->
<span cds-text="title">
  <cds-icon shape="logout" status="info" size="lg"></cds-icon> Gestion des types
  de sorties</span
>

<!-- Data grid -->
<clr-datagrid
  [(clrDgSingleSelected)]="selectedItem"
  [clrDgLoading]="loading"
  style="height: calc(100vh - 150px); margin-top: 1em"
>
  <clr-dg-action-bar>
    <!-- Actions -->
    <div class="btn-group">
      <cds-button
        action="outline"
        status="primary"
        (click)="openAddModal()"
        onKeyPress=""
      >
        <cds-icon shape="plus" size="md"></cds-icon> Ajouter
      </cds-button>
    </div>
    <div class="btn-group">
      <cds-button
        action="outline"
        status="warning"
        [disabled]="!selectedItem?.id"
        (click)="toggleShowEdit(selectedItem)"
        onkeypress=""
      >
        <cds-icon shape="note" size="md"></cds-icon> Modifier
      </cds-button>
    </div>
    <div class="btn-group">
      <cds-button
        action="outline"
        status="danger"
        (click)="deleteOutputType()"
        [disabled]="!selectedItem?.id"
        onkeypress=""
      >
        <cds-icon shape="trash" size="md"></cds-icon> Supprimer
      </cds-button>
    </div>
    <!-- Divider -->
    <cds-divider
      cds-layout="m-t:lg m-b:sm"
      class="htitled-divider"
      title="Types des sorties"
    ></cds-divider>
  </clr-dg-action-bar>
  <clr-dg-column [clrDgField]="'libelle'">Nom du type de sortie</clr-dg-column>
  <clr-dg-row
    *clrDgItems="let outputType of outputTypes"
    [clrDgItem]="outputType"
  >
    <clr-dg-cell>{{ outputType.libelle }}</clr-dg-cell>
  </clr-dg-row>
  <clr-dg-footer>{{ outputTypes.length }} Types des sorties</clr-dg-footer>
</clr-datagrid>

<!-- Modal method CRUD -->
<clr-modal #modal [(clrModalOpen)]="openModal" [clrModalSize]="'md'">
  <!-- Header -->
  <div class="modal-title">
    <cds-icon status="info" shape="logout" size="lg" solid=""></cds-icon>
    Gestion des types des sorties
  </div>
  <!-- Body -->
  <div class="modal-body">
    <!-- Form -->
    <form
      clrForm
      [formGroup]="outputTypeForm!"
      clrLabelSize="2"
      cds-layout="p-b:lg"
    >
      <clr-input-container>
        <label>Nom:</label>
        <input
          clrInput
          placeholder="Nom du type de sortie"
          type="text"
          formControlName="libelle"
          style="width: 425px"
        />
      </clr-input-container>
    </form>
  </div>
  <!-- Footer -->
  <div class="modal-footer">
    <!-- Buttons -->
    <cds-button
      action="outline"
      (click)="openModal = false"
      onKeyPress="openModal = false"
      >Annuler</cds-button
    >
    <cds-button
      status="primary"
      (click)="saveOutputType()"
      [disabled]="outputTypeForm.invalid"
      onkeypress=""
    >
      Sauvegarder
    </cds-button>
  </div>
</clr-modal>
