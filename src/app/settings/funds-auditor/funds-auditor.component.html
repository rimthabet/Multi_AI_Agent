<!-- Header -->
<span cds-text="title">
  <cds-icon shape="employee" status="info" size="lg"></cds-icon> Gestion des
  commissaires aux comptes des fonds</span
>

<!-- Data grid -->
<clr-datagrid
  [(clrDgSingleSelected)]="selectedItem"
  [clrDgLoading]="loading"
  style="height: calc(100vh - 150px); margin-top: 1em"
>
  <clr-dg-action-bar>
    <!-- Actions -->
    <div class="btn-group">
      <cds-button
        action="outline"
        status="primary"
        (click)="openAddModal()"
        onKeyPress=""
      >
        <cds-icon shape="plus" size="md"></cds-icon> Ajouter
      </cds-button>
    </div>
    <div class="btn-group">
      <cds-button
        action="outline"
        status="warning"
        [disabled]="!selectedItem?.id"
        (click)="toggleShowEdit(selectedItem)"
        onkeypress=""
      >
        <cds-icon shape="note" size="md"></cds-icon> Modifier
      </cds-button>
    </div>
    <div class="btn-group">
      <cds-button
        action="outline"
        status="danger"
        (click)="deleteAuditor()"
        [disabled]="!selectedItem?.id"
        onkeypress=""
      >
        <cds-icon shape="trash" size="md"></cds-icon> Supprimer
      </cds-button>
    </div>
    <!-- Divider -->
    <cds-divider
      cds-layout="m-t:lg m-b:sm"
      class="htitled-divider"
      title="Commissaires aux comptes des fonds"
    ></cds-divider>
  </clr-dg-action-bar>
  <clr-dg-column [clrDgField]="'libelle'">Nom du commissaire</clr-dg-column>
  <clr-dg-row *clrDgItems="let auditor of auditors" [clrDgItem]="auditor">
    <clr-dg-cell>{{ auditor.libelle }}</clr-dg-cell>
  </clr-dg-row>
  <clr-dg-footer>{{ auditors.length }} Commissaires aux comptes</clr-dg-footer>
</clr-datagrid>

<!-- Modal method CRUD -->
<clr-modal #modal [(clrModalOpen)]="openModal" [clrModalSize]="'md'">
  <!-- Header -->
  <div class="modal-title">
    <cds-icon status="info" shape="employee" size="lg"></cds-icon> Ajout d'un
    commissaire aux comptes (Fonds)
  </div>
  <!-- Body -->
  <div class="modal-body">
    <!-- Form -->
    <form
      clrForm
      [formGroup]="auditorForm!"
      clrLabelSize="2"
      cds-layout="p-b:lg p-t:lg"
    >
      <clr-input-container>
        <label>Nom:</label>
        <input
          clrInput
          placeholder="Nom du commissaire"
          type="text"
          formControlName="libelle"
          style="width: 425px"
        />
      </clr-input-container>
    </form>
  </div>
  <!-- Footer -->
  <div class="modal-footer">
    <!-- Buttons -->
    <cds-button
      action="outline"
      (click)="openModal = false"
      onKeyPress="openModal = false"
      >Annuler</cds-button
    >
    <cds-button
      status="primary"
      (click)="saveAuditor()"
      [disabled]="auditorForm.invalid"
      onkeypress=""
    >
      Sauvegarder
    </cds-button>
  </div>
</clr-modal>

<!-- Super admin dialog for deletion -->
<app-multi-purpose-delete-dialog
  #mp_delete_popup
  [warn_message]="delete_message"
  [pass_phrase]="selectedItem?.libelle"
  [rest_url]="rest_url"
></app-multi-purpose-delete-dialog>
