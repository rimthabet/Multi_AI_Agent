<!-- Header -->
<span cds-text="title">
  <cds-icon
    shape="calendar"
    status="info"
    size="lg"
    cds-layout="m-b:xs"
  ></cds-icon>
  Gestion des types des réunions</span
>

<!-- Data grid -->
<clr-datagrid
  [(clrDgSingleSelected)]="selectedItem"
  [clrDgLoading]="loading"
  style="height: calc(100vh - 155px); margin-top: 1em"
>
  <clr-dg-action-bar>
    <!-- Actions -->
    <div class="btn-group">
      <cds-button
        action="outline"
        status="primary"
        (click)="openAddModal()"
        onKeyPress=""
      >
        <cds-icon shape="plus" size="md"></cds-icon> Ajouter
      </cds-button>
    </div>
    <div class="btn-group">
      <cds-button
        action="outline"
        status="warning"
        [disabled]="!selectedItem?.id"
        (click)="toggleShowEdit(selectedItem)"
        onkeypress=""
      >
        <cds-icon shape="note" size="md"></cds-icon> Modifier
      </cds-button>
    </div>
    <div class="btn-group">
      <cds-button
        action="outline"
        status="danger"
        (click)="deleteMeetingType()"
        [disabled]="!selectedItem?.id"
        onkeypress=""
      >
        <cds-icon shape="trash" size="md"></cds-icon> Supprimer
      </cds-button>
    </div>
    <!-- Divider -->
    <cds-divider
      cds-layout="m-t:lg m-b:sm"
      class="htitled-divider"
      title="Inventaire des types de réunions"
    ></cds-divider>
  </clr-dg-action-bar>
  <clr-dg-column [clrDgField]="'libelle'">Libellé</clr-dg-column>
  <clr-dg-row
    *clrDgItems="let meetingType of meetingTypes"
    [clrDgItem]="meetingType"
  >
    <clr-dg-cell>{{ meetingType.libelle }}</clr-dg-cell>
  </clr-dg-row>
  <clr-dg-footer>{{ meetingTypes.length }} Types des réunions</clr-dg-footer>
</clr-datagrid>

<!-- Modal method CRUD -->
<clr-modal #modal [(clrModalOpen)]="openModal" [clrModalSize]="'md'">
  <!-- Header -->
  <div class="modal-title">
    <cds-icon status="info" shape="calendar" size="lg"></cds-icon> Gestion des
    types des réunions
  </div>
  <!-- Body -->
  <div class="modal-body">
    <!-- Form -->
    <form clrForm [formGroup]="meetingTypeForm!" clrLabelSize="2">
      <clr-input-container>
        <label>Libellé:</label>
        <input
          clrInput
          placeholder="Libellé du type de réunion"
          type="text"
          formControlName="libelle"
          style="width: 375px"
        />
      </clr-input-container>
    </form>
  </div>
  <!-- Footer -->
  <div class="modal-footer">
    <!-- Buttons -->
    <cds-button
      action="outline"
      (click)="openModal = false"
      onKeyPress="openModal = false"
      >Annuler</cds-button
    >
    <cds-button
      status="primary"
      (click)="saveMeetingType()"
      [disabled]="meetingTypeForm.invalid"
      onkeypress=""
    >
      Sauvegarder
    </cds-button>
  </div>
</clr-modal>
