<!-- Header -->
<span cds-text="title">
  <cds-icon shape="employee" status="info" size="lg"></cds-icon> Gestion des
  commissaires aux comptes des projets</span
>

<!-- Data grid -->
<clr-datagrid
  [(clrDgSingleSelected)]="selectedItem"
  [clrDgLoading]="loading"
  style="height: calc(100vh - 150px); margin-top: 1em"
>
  <clr-dg-action-bar>
    <!-- Actions -->
    <div class="btn-group">
      <cds-button
        action="outline"
        status="primary"
        (click)="openAddModal()"
        onKeyPress=""
      >
        <cds-icon shape="plus" size="md"></cds-icon> Ajouter
      </cds-button>
    </div>
    <!-- <div class="btn-group">
        <cds-button action="outline" status="warning" [disabled]="!selectedItem?.id"
            (click)="toggleShowEdit(selectedItem)" onkeypress="">
            <cds-icon shape="note" size="md"></cds-icon> Modifier
        </cds-button>
    </div> -->
    <div class="btn-group">
      <cds-button
        action="outline"
        status="danger"
        (click)="deleteProjectAuditor()"
        [disabled]="!selectedItem?.id"
        onkeypress=""
      >
        <cds-icon shape="trash" size="md"></cds-icon> Supprimer
      </cds-button>
    </div>
    <!-- Divider -->
    <cds-divider
      cds-layout="m-t:lg m-b:sm"
      class="htitled-divider"
      title="Commissaires aux comptes des projets"
    ></cds-divider>
  </clr-dg-action-bar>
  <clr-dg-column [clrDgField]="'libelle'">Nom & prénom</clr-dg-column>
  <clr-dg-column [clrDgField]="'cabinet'">Cabinet</clr-dg-column>
  <clr-dg-row
    *clrDgItems="let projectAuditor of projectAuditors"
    [clrDgItem]="projectAuditor"
  >
    <clr-dg-cell>{{ projectAuditor.libelle }}</clr-dg-cell>
    <clr-dg-cell>{{ projectAuditor.cabinet }}</clr-dg-cell>
  </clr-dg-row>
  <clr-dg-footer
    >{{ projectAuditors.length }} Commissaires aux comptes</clr-dg-footer
  >
</clr-datagrid>

<!-- Modal method CRUD -->
<statutory-auditor-form
  #project_auditor_form
  (refreshEvent)="loadProjectAuditors()"
  [(opened)]="openModal"
></statutory-auditor-form>
